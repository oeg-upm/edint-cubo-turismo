mappings:
  mappings_tourism:
    sources:
    - [../pathtodata.csv~csv]
    s: http://vocab.linkeddata.es/datosabiertos/def/actividad-economica/cubo-empleo/o$(Índice)
    po:
    - [rdf:type, qb:Observation]
    - [edintdimension:refAdminRegion, $(Área)]
    - [edintdimension:refPeriod, $(Periodo)]
    - [edintdimension:countryOfOrigin, $(País de Origen)]
    - [edintdimension:flowType, $(Tipo de Flujo Turístico)]
    - [edintdimension:registrationNumber, $(Número de Registro)]
    - [qb:dataSet, edinttur:SampleDataSet]
    - [edintmeasure:averageStay, $(Estancia Media)]
    - [edintmeasure:degreeOccupation, $(Grado de Ocupación)]
    - [edintmeasure:growthOfPlaces, $(Tasa de Crecimiento)]
    - [edintmeasure:intensityPerResident, $(Tasa de Intensidad por Residente)]
    - [edintmeasure:availablePlaces, $(Plazas disponibles)]
    - [edintmeasure:numTravelers, $(Número de Viajeros)]
    - [edintmeasure:occupiedPlaces, $(Número de Plazas Ocupadas)]
    - [edintmeasure:overnightStays, $(Número de Estancias¡)]
